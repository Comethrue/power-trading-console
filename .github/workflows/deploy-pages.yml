name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# 设置页面部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 允许并发部署，但取消排队
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 前端构建和部署
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建前端
      - name: Build
        env:
          VITE_BASE_URL: ${{ vars.FRONTEND_BASE_URL || '/power-trading-console/' }}
          VITE_API_BASE: ${{ vars.API_BASE_URL }}
        run: npm run build

      # 5. 上传到 GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  # 部署（必须在前端构建完成后）
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
